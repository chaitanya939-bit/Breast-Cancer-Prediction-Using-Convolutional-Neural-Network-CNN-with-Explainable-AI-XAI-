<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | Breast Cancer Prediction System</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f8ff;
}

/* HEADER */

.navbar{
background:linear-gradient(90deg,#0f4c81,#1a73e8);
}

.navbar-brand{
font-weight:600;
font-size:20px;
}

/* LOGIN SECTION */

.login-section{

height:85vh;

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1581595219315-a187dd40c322");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

}

/* LOGIN CARD */

.login-card{

background:white;
padding:40px;
border-radius:12px;
width:420px;

box-shadow:0px 10px 30px rgba(0,0,0,0.3);

}

.login-card h2{
text-align:center;
margin-bottom:25px;
color:#0f4c81;
}

.form-control{
padding:12px;
border-radius:8px;
}

.btn-login{
width:100%;
padding:12px;
background:#1a73e8;
border:none;
font-size:16px;
border-radius:8px;
}

.btn-login:hover{
background:#0f4c81;
}

.icon{
font-size:35px;
text-align:center;
color:#1a73e8;
margin-bottom:10px;
}

/* FOOTER */

footer{
background:#0f4c81;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>


<body>


<!-- HEADER -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">
<i class="fa-solid fa-heart-pulse"></i>
Breast Cancer AI System
</a>

<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/login">User Login</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/admin">Admin</a>
</li>

</ul>

</div>

</div>

</nav>


<!-- LOGIN SECTION -->

<section class="login-section">

<div class="login-card">

<div class="icon">
<i class="fa-solid fa-user-shield"></i>
</div>

<h2>Admin Login</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">Username</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-user"></i>
</span>

<input type="text"
class="form-control"
name="username"
placeholder="Enter username"
required>

</div>

</div>


<div class="mb-3">

<label class="form-label">Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>

<input type="password"
class="form-control"
name="password"
placeholder="Enter password"
required>

</div>

</div>


<button type="submit"
class="btn btn-login text-white">

Login

</button>

</form>

</div>

</section>


<!-- FOOTER -->

<footer>

<p>

Breast Cancer Prediction System Using CNN & Explainable AI (XAI) |
AI Healthcare Diagnostic Platform

</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
