<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prediction Result | Breast Cancer AI System</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f8ff;
}

/* HEADER */

.navbar{
background:linear-gradient(90deg,#0f4c81,#1a73e8);
}

.navbar-brand{
font-weight:600;
}

/* RESULT SECTION */

.result-section{

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1581595219315-a187dd40c322");

background-size:cover;
background-position:center;

padding:80px 0;

}

/* RESULT CARD */

.result-card{

background:white;
padding:40px;
border-radius:12px;

width:500px;
margin:auto;

box-shadow:0px 10px 30px rgba(0,0,0,0.3);

text-align:center;

}

.result-card h2{
color:#0f4c81;
margin-bottom:20px;
}

.result-image{
border-radius:10px;
margin:15px 0;
}

/* RESULT LABELS */

.result{
font-size:22px;
font-weight:600;
margin-top:10px;
}

.benign{
color:#28a745;
}

.malignant{
color:#dc3545;
}

.confidence{
font-size:18px;
color:#555;
}

/* BUTTONS */

.btn-custom{
width:100%;
margin-top:10px;
padding:12px;
border-radius:8px;
}

/* FOOTER */

footer{
background:#0f4c81;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>


<body>


<!-- HEADER -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">
<i class="fa-solid fa-heart-pulse"></i>
Breast Cancer AI System
</a>

<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/dashboard">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/upload">Upload</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/history">History</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/logout">Logout</a>
</li>

</ul>

</div>

</div>

</nav>


<!-- RESULT SECTION -->

<section class="result-section">

<div class="result-card">

<h2>Prediction Result</h2>

<img src="/{{image}}" width="320" class="result-image">

<div class="result {% if result == 'Benign' %}benign{% else %}malignant{% endif %}">
Diagnosis : {{result}}
</div>

<div class="confidence">
Confidence : {{confidence}}%
</div>

<br>

<a href="/gradcam?img={{image}}"
class="btn btn-primary btn-custom">

<i class="fa-solid fa-eye"></i>
View Grad-CAM Visualization

</a>

<a href="/dashboard"
class="btn btn-secondary btn-custom">

Back to Dashboard

</a>

</div>

</section>


<!-- FOOTER -->

<footer>

<p>

Breast Cancer Prediction System Using CNN & Explainable AI (XAI) |
AI Healthcare Diagnostic Platform

</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
