<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Registration | Breast Cancer AI System</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f4f8ff;
}

/* HEADER */

.navbar{
background:linear-gradient(90deg,#0f4c81,#1a73e8);
}

.navbar-brand{
font-weight:600;
}

/* REGISTER SECTION */

.register-section{

background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1581595219315-a187dd40c322");

background-size:cover;
background-position:center;

padding:80px 0;

}

/* FORM CARD */

.register-card{

background:white;
padding:40px;
border-radius:12px;
width:450px;

box-shadow:0px 10px 30px rgba(0,0,0,0.3);

margin:auto;

}

.register-card h2{
text-align:center;
color:#0f4c81;
margin-bottom:25px;
}

.form-control, select{
padding:10px;
border-radius:8px;
}

/* BUTTON */

.btn-register{
width:100%;
padding:12px;
background:#1a73e8;
border:none;
font-size:16px;
border-radius:8px;
}

.btn-register:hover{
background:#0f4c81;
}

.icon{
text-align:center;
font-size:35px;
color:#1a73e8;
margin-bottom:10px;
}

/* FOOTER */

footer{
background:#0f4c81;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>


<body>


<!-- HEADER -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">
<i class="fa-solid fa-heart-pulse"></i>
Breast Cancer AI System
</a>

<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/login">User Login</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/register">Register</a>
</li>

</ul>

</div>

</div>

</nav>


<!-- REGISTRATION SECTION -->

<section class="register-section">

<div class="register-card">

<div class="icon">
<i class="fa-solid fa-user-plus"></i>
</div>

<h2>User Registration</h2>

<form method="POST">

<div class="mb-3">
<label>Full Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="mb-3">
<label>Age</label>
<input type="number" name="age" class="form-control" required>
</div>

<div class="mb-3">
<label>Gender</label>
<select name="gender" class="form-control">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="mb-3">
<label>Phone Number</label>
<input type="text" name="phone" class="form-control" required>
</div>

<button type="submit"
class="btn btn-register text-white">

Register

</button>

</form>

<p class="text-center mt-3">
Already registered?
<a href="/login">Login here</a>
</p>

</div>

</section>


<!-- FOOTER -->

<footer>

<p>

Breast Cancer Prediction System Using CNN & Explainable AI (XAI) |
AI Healthcare Diagnostic Platform

</p>

</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
